<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador LR(1)</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">LR(1)</p>
        <h1>LR(1) grammar</h1>
      </div>
    </header>

    <section class="workspace-top">
      <aside class="panel grammar-panel">
        <div class="panel-title-row">
          <h2>Gramática LR(1)</h2>
          <span class="mini-tag">Entrada</span>
        </div>
        <div class="meta-block">
          <div><strong>Inicial visible:</strong> <span id="grammarInitial"></span></div>
        </div>
        <div class="editor-wrap">
          <textarea id="grammarTextView" spellcheck="false" readonly></textarea>
        </div>
      </aside>

      <section class="panel closure-panel">
        <div class="panel-title-row">
          <h2>Closure Table</h2>
          <span class="mini-tag">Estados LR(1)</span>
        </div>
        <div id="conflictsBox" class="alert hidden"></div>
        <div class="table-wrap compact">
          <table id="closureTable"></table>
        </div>
      </section>
    </section>

    <section class="workspace-bottom">
      <section class="left-column">
        <section class="panel first-panel">
          <div class="panel-title-row">
            <h2>FIRST</h2>
            <span class="mini-tag">Conjuntos</span>
          </div>
          <div class="table-wrap compact">
            <table id="firstTable"></table>
          </div>
        </section>

        <!-- LR Table removed for presentation: kept in code but hidden from UI -->
        <!--
        <section class="panel lr-panel">
          <div class="panel-title-row">
            <h2>LR Table</h2>
            <span class="mini-tag">ACTION / GOTO</span>
          </div>
          <div class="table-wrap">
            <table id="lrTable"></table>
          </div>
        </section>
        -->
      </section>

      <section class="panel parser-panel">
        <div class="panel-title-row">
          <h2>Input y Parseo</h2>
          <span class="mini-tag">Traza</span>
        </div>

        <div class="parser-controls">
          <div class="field">
            <label for="tokenInput">Input (tokens)</label>
            <input id="tokenInput" type="text" placeholder="id + id * id">
          </div>
          <div class="field small">
            <label for="maxStepsInput">Maximum number of steps</label>
            <input id="maxStepsInput" type="number" min="1" value="100">
          </div>
          <div class="field action-field">
            <label>&nbsp;</label>
            <button id="parseBtn">Parse</button>
          </div>
        </div>

        <div class="parser-status-row">
          <div id="parseStatus" class="status-chip"></div>
          <div class="input-preview">
            <strong>Entrada cargada:</strong>
            <span id="loadedInput"></span>
          </div>
        </div>

        <div class="parser-results">
          <div class="trace-box">
            <h3>Trace</h3>
            <div class="table-wrap">
              <table id="traceTable"></table>
            </div>
          </div>

          <div class="tree-box">
            <h3>Tree</h3>
            <div id="treeRoot" class="tree-root"></div>
          </div>
        </div>
      </section>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
